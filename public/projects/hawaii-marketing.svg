<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="palm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1600" height="1200" fill="url(#sky)"/>
  
  <!-- Sun -->
  <circle cx="1200" cy="400" r="120" fill="#FFD700" opacity="0.9"/>
  
  <!-- Mountains/Diamond Head silhouette -->
  <polygon points="0,700 200,500 400,550 600,450 800,500 1000,520 1200,480 1400,550 1600,600 1600,800 0,800" fill="#4A6741" opacity="0.7"/>
  
  <!-- Ocean -->
  <rect y="750" width="1600" height="450" fill="url(#ocean)" opacity="0.85"/>
  
  <!-- Beach -->
  <ellipse cx="800" cy="780" rx="900" ry="80" fill="#F4D03F" opacity="0.8"/>
  
  <!-- Palm tree left -->
  <rect x="180" y="350" width="20" height="400" fill="#8B4513" rx="5"/>
  <ellipse cx="220" cy="350" rx="100" ry="30" fill="url(#palm)" transform="rotate(-20, 220, 350)"/>
  <ellipse cx="160" cy="360" rx="90" ry="25" fill="url(#palm)" transform="rotate(15, 160, 360)"/>
  <ellipse cx="200" cy="330" rx="80" ry="25" fill="url(#palm)" transform="rotate(-40, 200, 330)"/>
  <ellipse cx="150" cy="340" rx="85" ry="22" fill="#388E3C" transform="rotate(30, 150, 340)"/>
  
  <!-- Palm tree right -->
  <rect x="1350" y="300" width="18" height="450" fill="#8B4513" rx="5"/>
  <ellipse cx="1380" cy="300" rx="95" ry="28" fill="url(#palm)" transform="rotate(-25, 1380, 300)"/>
  <ellipse cx="1320" cy="310" rx="85" ry="25" fill="url(#palm)" transform="rotate(20, 1320, 310)"/>
  <ellipse cx="1360" cy="280" rx="75" ry="22" fill="#388E3C" transform="rotate(-35, 1360, 280)"/>
  
  <!-- Waves -->
  <path d="M0,850 Q200,830 400,850 Q600,870 800,850 Q1000,830 1200,850 Q1400,870 1600,850 L1600,900 Q1400,880 1200,900 Q1000,920 800,900 Q600,880 400,900 Q200,920 0,900 Z" fill="white" opacity="0.3"/>
  <path d="M0,900 Q200,880 400,900 Q600,920 800,900 Q1000,880 1200,900 Q1400,920 1600,900 L1600,950 Q1400,930 1200,950 Q1000,970 800,950 Q600,930 400,950 Q200,970 0,950 Z" fill="white" opacity="0.2"/>
  
  <!-- Clouds -->
  <ellipse cx="400" cy="200" rx="120" ry="50" fill="white" opacity="0.6"/>
  <ellipse cx="480" cy="190" rx="80" ry="40" fill="white" opacity="0.5"/>
  <ellipse cx="900" cy="150" rx="100" ry="40" fill="white" opacity="0.4"/>
</svg>