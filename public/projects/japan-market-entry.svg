<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="800" cy="600" r="350" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="800" cy="600" rx="350" ry="150" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <ellipse cx="800" cy="600" rx="150" ry="350" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Latitude lines -->
  <ellipse cx="800" cy="450" rx="320" ry="80" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>
  <ellipse cx="800" cy="750" rx="320" ry="80" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>
  <!-- Connection dots - cities -->
  <circle cx="600" cy="500" r="8" fill="#E94560" opacity="0.9"/>
  <circle cx="950" cy="550" r="8" fill="#E94560" opacity="0.9"/>
  <circle cx="700" cy="650" r="6" fill="#E94560" opacity="0.7"/>
  <circle cx="1000" cy="480" r="6" fill="#E94560" opacity="0.7"/>
  <circle cx="550" cy="620" r="6" fill="#E94560" opacity="0.7"/>
  <circle cx="850" cy="700" r="5" fill="#E94560" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="600" y1="500" x2="950" y2="550" stroke="#E94560" stroke-width="1" opacity="0.4"/>
  <line x1="950" y1="550" x2="1000" y2="480" stroke="#E94560" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="500" x2="700" y2="650" stroke="#E94560" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="650" x2="850" y2="700" stroke="#E94560" stroke-width="1" opacity="0.3"/>
  <line x1="550" y1="620" x2="600" y2="500" stroke="#E94560" stroke-width="1" opacity="0.3"/>
  <!-- Torii gate silhouette -->
  <rect x="730" y="820" width="12" height="120" fill="#ffffff" opacity="0.15"/>
  <rect x="858" y="820" width="12" height="120" fill="#ffffff" opacity="0.15"/>
  <rect x="715" y="810" width="170" height="14" fill="#ffffff" opacity="0.15" rx="3"/>
  <rect x="720" y="840" width="160" height="8" fill="#ffffff" opacity="0.1"/>
  <!-- Decorative dots -->
  <circle cx="300" cy="300" r="3" fill="white" opacity="0.3"/>
  <circle cx="1300" cy="250" r="2" fill="white" opacity="0.2"/>
  <circle cx="1400" cy="800" r="3" fill="white" opacity="0.25"/>
  <circle cx="200" cy="900" r="2" fill="white" opacity="0.2"/>
</svg>